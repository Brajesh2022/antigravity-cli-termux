name: Actionlint

on:
  pull_request:
    paths:
      - '.github/workflows/**'

permissions:
  contents: read

concurrency:
  group: actionlint-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run actionlint
        uses: docker://rhysd/actionlint:1.7.12
        with:
          args: -color
