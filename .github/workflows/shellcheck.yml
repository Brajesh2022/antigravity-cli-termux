name: ShellCheck

on:
  pull_request:
    paths:
      - '**/*.sh'
      - '.github/scripts/**'

permissions:
  contents: read

concurrency:
  group: shellcheck-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run ShellCheck
        uses: bewuethr/shellcheck-action@v2.3.0
